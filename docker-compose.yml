# ===========================================
# Docker Compose - Teams Tracking System
# ===========================================
# Sobe MySQL e backend para desenvolvimento local.
# Uso: docker compose up --build
# ===========================================

services:
  mysql:
    image: mysql:8.0
    container_name: tracking-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-challenge}
      MYSQL_USER: ${MYSQL_USER:-trackinguser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trackingpass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootroot}
    volumes:
      # Volume nomeado para persistir os dados do MySQL entre restarts.
      # Sem isso, os dados seriam perdidos ao parar o container.
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tracking-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-challenge}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-trackinguser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-trackingpass}
      EXTERNAL_API_BASE_URL: ${EXTERNAL_API_BASE_URL:-https://desafio-media.onrender.com}
      EXTERNAL_API_KEY: ${EXTERNAL_API_KEY}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_SCHEDULERS_ENABLED: ${APP_SCHEDULERS_ENABLED:-true}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
