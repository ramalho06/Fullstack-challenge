# ============================================================
# Configuração principal da aplicação - Teams Tracking API
# ============================================================
# Todas as configurações sensíveis (credenciais, API keys)
# são lidas de variáveis de ambiente. Consulte .env.example
# para ver a lista completa de variáveis necessárias.
# ============================================================

server:
  port: 8080

spring:
  application:
    name: teams-tracking-api

  # ---------- Banco de Dados ----------
  # As variáveis ${...} são resolvidas pelo Spring a partir
  # de variáveis de ambiente do sistema operacional.
  # Isso garante que segredos nunca fiquem no código-fonte.
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---------- JPA / Hibernate ----------
  jpa:
    hibernate:
      # 'update' cria/altera tabelas automaticamente baseado nas entidades.
      # Ideal para desenvolvimento. Em produção, use 'validate' + Flyway/Liquibase.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# ---------- API Externa (GPS) ----------
# Configurações customizadas para a integração com a API de GPS.
# O prefixo 'external.api' é uma convenção do projeto, não do Spring.
external:
  api:
    base-url: ${EXTERNAL_API_BASE_URL}
    key: ${EXTERNAL_API_KEY}
