# ============================================================
# Configuração principal da aplicação - Teams Tracking API
# ============================================================
# Todas as configurações sensíveis (credenciais, API keys)
# são lidas de variáveis de ambiente. Consulte .env.example
# para ver a lista completa de variáveis necessárias.
# ============================================================

server:
  port: 8080

spring:
  application:
    name: teams-tracking-api

  # ---------- Banco de Dados ----------
  # As variáveis ${...} são resolvidas pelo Spring a partir
  # de variáveis de ambiente do sistema operacional.
  # Isso garante que segredos nunca fiquem no código-fonte.
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---------- JPA / Hibernate ----------
  jpa:
    hibernate:
      # Flyway cria/altera o schema. O Hibernate apenas valida se as entidades
      # continuam compatíveis com as tabelas versionadas.
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # ---------- Migrations ----------
  flyway:
    enabled: true
    locations: classpath:db/migration

# ---------- API Externa (GPS) ----------
# Configurações customizadas para a integração com a API de GPS.
# O prefixo 'external.api' é uma convenção do projeto, não do Spring.
external:
  api:
    base-url: ${EXTERNAL_API_BASE_URL}
    key: ${EXTERNAL_API_KEY}

# ---------- Schedulers de Sincronização ----------
# Os schedulers são gatilhos automáticos para os mesmos services usados
# pelos endpoints manuais em /api/v1/sync/*.
app:
  schedulers:
    enabled: true
    agents-fixed-delay-ms: 600000
    agents-initial-delay-ms: 30000
    locations-fixed-delay-ms: 60000
    locations-initial-delay-ms: 45000
    check-ins-fixed-delay-ms: 120000
    check-ins-initial-delay-ms: 60000
    geofences-fixed-delay-ms: 1800000
    geofences-initial-delay-ms: 90000
